<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .map-polygon {
        clip-path: polygon(25% 10%, 75% 15%, 85% 65%, 40% 90%, 10% 60%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background font-body text-on-surface antialiased overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-stone-900/80 backdrop-blur-xl shadow-sm dark:shadow-none h-16 flex items-center justify-between px-6">
<div class="flex items-center gap-4">
<button class="text-emerald-900 dark:text-emerald-500 active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="text-emerald-900 dark:text-emerald-50 font-extrabold uppercase tracking-widest text-sm">The Agrarian Editorial</h1>
</div>
<div class="w-8 h-8 rounded-full bg-surface-container overflow-hidden ring-2 ring-primary-container/20">
<img alt="User profile" class="w-full h-full object-cover" data-alt="portrait of a professional farm manager with a confident expression in soft outdoor lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDEFaFEbrnlzBR8cZQWb8wweL9n6qX1dacC_4eFbbYZMByzTrF9QRFpO6-5-pZgpYKY2k3wRgdOeqwc69hBvum-KY8CMALc_115DfqX5iXtf7YHVnTYiOEbuw9v-4Qvsz5Y0AGYL-tSte4-BgpXpUAL4EIBbyCEhLOCl6Tf3zUIgJjhnNedvKAdIS1jmATjeS9gH5dC-7SK0YWSYGRXZJfJIWsFAQvZzoYCwU4pJUAbLxPeI6X_1lXflAVfpJrP5CxpaVTYsYf7AqFM"/>
</div>
</header>
<!-- Full Screen Map Background -->
<main class="relative h-screen w-full pt-16 pb-24">
<div class="absolute inset-0 bg-stone-200">
<img class="w-full h-full object-cover filter brightness-75 contrast-125" data-alt="high-resolution satellite view of geometric green and brown farm fields with varying soil textures" data-location="North Field A1" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDfB6tb6m4FYwrpPeYfHtucyTCD41-tMEU3EL5CKApg8h2CbGb1seom8S4c_yUXLVrBMpEmcBfHD5PMYRuLhOk7QvEi5842mvkyv-44M8OnCIbSS0YKh5ieBwQ20ze6PzNzD8RZCJ5Lq8qBYqNdQSPszXKsoJ-nHiBeV4z_0e0zmyqeUaO5uWJ55CwrP1mdqlNnHNtztc33lgwsSLCGqdnLmhvJ7tUr9t4NwxoXF5izgNXZGjv59nijMTlAgW0Eg0dMxgaEnenWVQ1c"/>
<!-- Map Overlay UI -->
<div class="absolute inset-0 bg-black/10"></div>
<!-- Field Polygon Highlight -->
<div class="absolute top-[20%] left-[15%] w-[60%] h-[40%] bg-emerald-500/20 border-2 border-emerald-400/60 map-polygon backdrop-blur-[1px]"></div>
<!-- Task Marker -->
<div class="absolute top-[40%] left-[45%] -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<div class="bg-primary text-on-primary p-2 rounded-full shadow-lg ring-4 ring-white/30 animate-pulse">
<span class="material-symbols-outlined block" data-icon="science" style="font-variation-settings: 'FILL' 1;">science</span>
</div>
<div class="mt-2 bg-white/90 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-tighter text-emerald-900 shadow-sm">
                    Soil PH Testing
                </div>
</div>
<!-- Map Controls -->
<div class="absolute right-4 top-24 flex flex-col gap-2">
<button class="w-12 h-12 bg-white/90 backdrop-blur-md rounded-xl flex items-center justify-center text-primary shadow-lg active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
</button>
<button class="w-12 h-12 bg-white/90 backdrop-blur-md rounded-xl flex items-center justify-center text-primary shadow-lg active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
</div>
</div>
<!-- Task Bottom Sheet -->
<div class="absolute bottom-24 left-0 right-0 px-4 z-40">
<div class="bg-white/70 backdrop-blur-2xl rounded-3xl shadow-[0_-4px_40px_rgba(0,0,0,0.1)] overflow-hidden">
<!-- Drag Handle -->
<div class="w-full flex justify-center py-3">
<div class="w-12 h-1.5 bg-stone-300 rounded-full"></div>
</div>
<div class="px-6 pb-8 pt-2">
<!-- Header Section -->
<div class="flex justify-between items-start mb-4">
<div>
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-stone-400 block mb-1">North Field A1</span>
<h2 class="font-headline text-2xl font-extrabold text-primary leading-tight tracking-tight">Soil PH Testing</h2>
</div>
<div class="flex flex-col items-end gap-2">
<span class="bg-emerald-100 text-emerald-900 text-[10px] px-2.5 py-1 rounded-full font-bold uppercase tracking-wider">Soil</span>
<span class="bg-secondary-container text-on-secondary-fixed-variant text-[10px] px-2.5 py-1 rounded-full font-bold uppercase tracking-wider flex items-center gap-1">
<span class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse"></span>
                                In Progress
                            </span>
</div>
</div>
<!-- Details Bento-ish Grid -->
<div class="grid grid-cols-2 gap-3 mb-6">
<div class="bg-surface-container-low p-4 rounded-xl">
<span class="text-[10px] font-bold text-stone-400 uppercase tracking-widest block mb-2">Assignee</span>
<div class="flex items-center gap-2">
<div class="w-6 h-6 rounded-full bg-emerald-900 flex items-center justify-center text-[10px] text-white font-bold">JM</div>
<span class="text-sm font-semibold text-on-surface">J. Miller</span>
</div>
</div>
<div class="bg-surface-container-low p-4 rounded-xl">
<span class="text-[10px] font-bold text-stone-400 uppercase tracking-widest block mb-2">Last Update</span>
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-sm" data-icon="schedule">schedule</span>
<span class="text-sm font-semibold">14m ago</span>
</div>
</div>
</div>
<!-- Progress Section -->
<div class="mb-8">
<div class="flex justify-between items-end mb-2">
<span class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">Progress</span>
<span class="font-headline text-lg font-bold text-primary">75%</span>
</div>
<div class="h-1.5 w-full bg-outline-variant rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 75%;"></div>
</div>
</div>
<!-- Actions -->
<div class="flex gap-3">
<button class="flex-1 bg-gradient-to-r from-primary to-primary-container text-on-primary py-4 rounded-full font-headline font-bold text-sm tracking-wide shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg" data-icon="check_circle">check_circle</span>
                            Complete Task
                        </button>
<button class="px-6 bg-surface-container-highest text-primary py-4 rounded-full font-headline font-bold text-sm shadow-sm active:scale-95 transition-all">
                            Edit
                        </button>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/70 dark:bg-stone-900/70 backdrop-blur-2xl shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-50 rounded-t-3xl overflow-hidden">
<a class="flex flex-col items-center justify-center text-emerald-900 dark:text-emerald-400 bg-emerald-100/50 dark:bg-emerald-900/40 rounded-xl px-4 py-1.5 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-inter font-medium text-[10px] uppercase tracking-wider mt-1">Map</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-4 py-1.5 hover:text-emerald-700 dark:hover:text-emerald-300 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="assignment_turned_in">assignment_turned_in</span>
<span class="font-inter font-medium text-[10px] uppercase tracking-wider mt-1">Tasks</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-4 py-1.5 hover:text-emerald-700 dark:hover:text-emerald-300 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="agriculture">agriculture</span>
<span class="font-inter font-medium text-[10px] uppercase tracking-wider mt-1">Machinery</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-4 py-1.5 hover:text-emerald-700 dark:hover:text-emerald-300 active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-inter font-medium text-[10px] uppercase tracking-wider mt-1">Settings</span>
</a>
</nav>
